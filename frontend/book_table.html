<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Table | Delish Dine</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif;}

body{
    margin:0;
    min-height:100vh;
    font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
    color:#fff;

    /* Restaurant image + dark overlay */
    background:
      linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
      url("https://images.unsplash.com/photo-1552566626-52f8b828add9?q=80&w=1920&auto=format&fit=crop") center/cover no-repeat fixed;
}

/* Navbar */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 60px;
    background:#000;
}
.logo{font-size:24px;font-weight:bold;color:#f4a261;}
.nav-links a{
    margin-left:25px;
    color:#fff;
    text-decoration:none;
    font-weight:600;
}
.nav-links a:hover{color:#f4a261;}

/* Form Container */
.container{
    width:420px;
    margin:60px auto;
    background:rgba(0,0,0,0.8);
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,0.6);
}
 /* .container{
    backdrop-filter: blur(6px);
    background: rgba(0,0,0,0.55);
} */

.container h2{
    text-align:center;
    margin-bottom:20px;
    color:#f4a261;
}

input, select{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    background:#f4a261;
    border:none;
    border-radius:25px;
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;
}

button:hover{background:#e76f51;}
</style>
</head>

<body>

<nav>
    <div class="logo">Delish Dine</div>
    <div class="nav-links">
        <a href="landing_page.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="login.html">Login</a>
    </div>
</nav>

<div class="container">
    <h2>Book Your Table</h2>
    <form onsubmit="bookTable(event)">
        <input type="text" placeholder="Full Name" required>
        <input type="tel" placeholder="Phone Number" required>
        <input type="date" required>
        <input type="time" required>
        <select required>
            <option value="">Number of Guests</option>
            <option>1 Person</option>
            <option>2 People</option>
            <option>3 People</option>
            <option>4 People</option>
            <option>5+ People</option>
        </select>
        <button type="submit">Confirm Booking</button>
    </form>
</div>

<script>
function bookTable(e){
    e.preventDefault();
    alert("🎉 Table Booked Successfully!\nWe look forward to serving you at Delish Dine.");
}
</script>

</body>
</html>
